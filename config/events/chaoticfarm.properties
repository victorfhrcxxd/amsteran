# ============================================
# Chaotic Farm — Permanent Multi-Room PvP/Farm
# ============================================

EnableChaoticFarm = False

# Number of simultaneous rooms (must match the Room* entries below).
ChaoticFarmRoomCount = 5

# Seconds a player may farm alone before being auto-removed.
# Timer resets on every new solo ownership phase.
ChaoticFarmMaxFarmSeconds = 300

# Countdown in seconds before the duel starts after a challenger enters.
ChaoticFarmDuelCountdown = 5

# Maximum distance (in game units) a player may be from the room center.
# If exceeded during a duel, the player is considered defeated.
ChaoticFarmAllowedRadius = 1200

# NPC template ID of the farm mob spawned in each room.
ChaoticFarmMobNpcId = 18001

# Seconds to wait before respawning the mob after it dies.
ChaoticFarmMobRespawnSeconds = 3

# Drop table for the Chaotic Farm mob.
# Format: itemId,minAmount,maxAmount,chance(0-100);...
# chance is a percentage (100 = always, 50 = 50% chance, etc.)
# Example below: adena 10k-20k always; item 4037 x1-2 at 25%; item 6673 x1 at 10%
ChaoticFarmMobDrops = 57,10000,20000,100;4037,1,2,25;6673,1,1,10

# Seconds a lone player waits in queue before being assigned as room owner.
# If a second player joins before this timer expires, both are matched into a duel instead.
ChaoticFarmQueueWaitSeconds = 30

# Seconds both players are frozen (immobilized) before the duel starts.
ChaoticFarmFreezeSeconds = 5

# Seconds the new room owner is protected from challengers after taking control.
# Applies when: first player enters an empty room, or duel winner becomes owner.
ChaoticFarmSafeSeconds = 10

# Seconds before a Chaotic Farm fake player automatically re-enters the queue after leaving a room.
# Set to 0 to disable auto-requeue delay (immediate requeue).
ChaoticFarmFakeRequeueDelaySeconds = 5

# Anti-dualbox protection for matchmaking.
# Block pairing of two players from the same IP.
ChaoticFarmAntiDualboxCheckIP = True
# Block pairing of two players with the same HWID.
ChaoticFarmAntiDualboxCheckHWID = True

# Location (x,y,z) where the loser is teleported after a duel ends.
ChaoticFarmExitLoc = -120280,-225003,-3327

# ============================================
# Per-Room Positions
# ============================================
# Each room requires 4 coordinate sets (x,y,z):
#   Room<N>Center        - arena center used for boundary enforcement
#   Room<N>OwnerSpawn    - where the owner spawns / winner is repositioned
#   Room<N>ChallengerSpawn - where the challenger spawns on entry
#   Room<N>MobSpawn      - where the farm mob is spawned

Room1Center          = -120280,-225003,-3327
Room1OwnerSpawn      = -120380,-225003,-3327
Room1ChallengerSpawn = -120180,-225003,-3327
Room1MobSpawn        = -120280,-225003,-3327

