<html>
<body>
<title>Offline Farm</title>
<center>
<table width=260>
<tr>
<td align=left><a action="bypass -h voiced_offlinefarm">Back</a></td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td width=130 align=center>Adena + B. Armor</td>
<td width=130 align=center>Adena + B. Weapon</td>
</tr>
<tr>
<td width=130 align=center>
<button value=" " action="bypass -h voiced_offlinefarm_zone 1" width=16 height=16 %zone1%>
</td>
<td width=130 align=center>
<button value=" " action="bypass -h voiced_offlinefarm_zone 2" width=16 height=16 %zone2%>
</td>
</tr>
</table>
<br>
<table width=260 height=60 bgcolor=1B1B1B>
<tr>
<td align=center>
<font color=999999>Tempo Restante:</font><br1>
%time%
</td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td align=center>
<font color=999999>Voce continua participando de:</font><br1>
%status%
</td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td align=center><font color=999999>Deseja adicionar mais tempo?</font></td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td align=center>
<button value="RENOVAR AGORA" action="bypass -h voiced_offlinefarm_confirm" width=200 height=31 back=L2UI_CT1.Button_DF_Down fore=L2UI_CT1.Button_DF>
</td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td align=center>
<button value="%button%" action="bypass -h voiced_offlinefarm_start" width=200 height=31 back=L2UI_CT1.Button_DF_Down fore=L2UI_CT1.Button_DF>
</td>
</tr>
</table>
<br>
<table width=260>
<tr>
<td align=center>
<font color=FFCC00>COMO USAR:</font><br><br>
<font color=999999>1. Compre o sistema no botao acima.</font><br1>
<font color=999999>2. Clique em ATIVAR ou use</font> <font color=FFCC00>.farmoff</font><br1>
<font color=999999>para ativar e desconectar.</font>
</td>
</tr>
</table>
</center>
</body>
</html>
