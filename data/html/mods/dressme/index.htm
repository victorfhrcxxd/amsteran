<html>
<body>
<title>DressMe System</title>
<center>
<img src="L2UI_CH3.herotower_deco" width=256 height=32>
<br>
<table width=300>
<tr>
<td align=center><font color=999999>%dat%</font></td>
<td align=center><font color=LEVEL>DressMe Skin System</font></td>
<td align=center><font color=999999>%time%</font></td>
</tr>
</table>
<img src="L2UI.Squaregray" width="300" height="1">
<br>
<table width=300>
<tr>
<td align=center width=150><button value="Armor Skins" action="bypass -h dressme 1 skinlist armor" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
<td align=center width=150><button value="Weapon Skins" action="bypass -h dressme 1 skinlist weapon" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
<tr>
<td align=center width=150><button value="Hair Skins" action="bypass -h dressme 1 skinlist hair" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
<td align=center width=150><button value="Shield Skins" action="bypass -h dressme 1 skinlist shield" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
</table>
<img src="L2UI.Squaregray" width="300" height="1">
<br>
<table width=300>
<tr>
<td align=center><button value="My Skins" action="bypass -h dressme 1 myskinlist all" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
</table>
<img src="L2UI.Squaregray" width="300" height="1">
<br>
<font color=F2C202>Remove Active Skins</font>
<br>
<table width=300>
<tr>
<td align=center width=150><button value="Remove Armor" action="bypass -h dressme 1 clean armor" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
<td align=center width=150><button value="Remove Weapon" action="bypass -h dressme 1 clean weapon" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
<tr>
<td align=center width=150><button value="Remove Hair" action="bypass -h dressme 1 clean hair" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
<td align=center width=150><button value="Remove Shield" action="bypass -h dressme 1 clean shield" width=134 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
<tr>
<td colspan=2 align=center><button value="Remove All Skins" action="bypass -h dressme 1 cleanall" width=200 height=21 back=L2UI_ch3.Btn1_normalOn fore=L2UI_ch3.Btn1_normal></td>
</tr>
</table>
<img src="L2UI_CH3.herotower_deco" width=256 height=32>
</center>
</body>
</html>
